<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Inter, 'DejaVu Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6eef7" />
      <stop offset="48%" stop-color="#f2ece1" />
      <stop offset="100%" stop-color="#f7e0da" />
    </linearGradient>
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#3a3a55" flood-opacity="0.20" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a1a1aa" />
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb" />
    </marker>
  </defs>

  <!-- soft light gradient background -->
  <rect width="1600" height="900" fill="url(#bg)" />

  <!-- floating card -->
  <rect x="80" y="70" width="1440" height="760" rx="26" fill="#ffffff" stroke="#e7e7ee" stroke-width="1.5" filter="url(#cardShadow)" />

  <!-- title -->
  <text x="130" y="156" font-size="44" font-weight="700" fill="#18181b">Self-hosted SearXNG</text>
  <text x="132" y="196" font-size="25" fill="#6b6b73">Private metasearch behind a Caddy reverse proxy</text>

  <!-- docker network boundary -->
  <rect x="400" y="262" width="620" height="468" rx="20" fill="#fafafb" stroke="#cdcdd6" stroke-width="2" stroke-dasharray="9 9" />
  <text x="424" y="300" font-size="21" fill="#8a8a93">Docker network · internal only</text>

  <!-- Browser (outside, left) -->
  <rect x="130" y="410" width="210" height="150" rx="16" fill="#fbfbfc" stroke="#dcdce2" stroke-width="2" />
  <text x="235" y="480" text-anchor="middle" font-size="30" font-weight="600" fill="#1f1f24">Browser</text>
  <text x="235" y="514" text-anchor="middle" font-size="20" fill="#71717a">you</text>

  <!-- Caddy (host-exposed, accent) -->
  <rect x="440" y="410" width="230" height="150" rx="16" fill="#eef5ff" stroke="#2563eb" stroke-width="2.5" />
  <text x="555" y="470" text-anchor="middle" font-size="30" font-weight="600" fill="#18181b">Caddy</text>
  <text x="555" y="502" text-anchor="middle" font-size="19" fill="#3b4a63">:80 · reverse proxy</text>
  <text x="555" y="530" text-anchor="middle" font-size="17" fill="#2563eb">only host-exposed</text>

  <!-- SearXNG core -->
  <rect x="740" y="410" width="240" height="150" rx="16" fill="#fbfbfc" stroke="#dcdce2" stroke-width="2" />
  <text x="860" y="470" text-anchor="middle" font-size="28" font-weight="600" fill="#1f1f24">SearXNG core</text>
  <text x="860" y="504" text-anchor="middle" font-size="19" fill="#71717a">:8080 · internal</text>

  <!-- Valkey -->
  <rect x="740" y="600" width="240" height="112" rx="16" fill="#fbfbfc" stroke="#dcdce2" stroke-width="2" />
  <text x="860" y="650" text-anchor="middle" font-size="26" font-weight="600" fill="#1f1f24">Valkey</text>
  <text x="860" y="682" text-anchor="middle" font-size="18" fill="#71717a">cache · internal</text>

  <!-- Upstream engines (outside, right) -->
  <rect x="1240" y="410" width="230" height="150" rx="16" fill="#fbfbfc" stroke="#dcdce2" stroke-width="2" />
  <text x="1355" y="465" text-anchor="middle" font-size="25" font-weight="600" fill="#1f1f24">Upstream</text>
  <text x="1355" y="495" text-anchor="middle" font-size="25" font-weight="600" fill="#1f1f24">engines</text>
  <text x="1355" y="527" text-anchor="middle" font-size="17" fill="#71717a">Google · Bing · DDG …</text>

  <!-- arrows -->
  <!-- browser -> caddy -->
  <line x1="344" y1="485" x2="434" y2="485" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowAccent)" />
  <text x="389" y="469" text-anchor="middle" font-size="17" fill="#2563eb">request</text>

  <!-- caddy -> core -->
  <line x1="674" y1="485" x2="734" y2="485" stroke="#a1a1aa" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="704" y="469" text-anchor="middle" font-size="16" fill="#8a8a93">proxy</text>

  <!-- core -> valkey -->
  <line x1="860" y1="564" x2="860" y2="596" stroke="#a1a1aa" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="876" y="586" font-size="16" fill="#8a8a93">cache</text>

  <!-- core -> engines -->
  <line x1="984" y1="485" x2="1236" y2="485" stroke="#a1a1aa" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="1110" y="469" text-anchor="middle" font-size="17" fill="#8a8a93">queries out</text>

  <!-- caption -->
  <text x="130" y="792" font-size="22" fill="#9a9aa3">Only the proxy is exposed to the host; the core and cache stay on the internal Docker network.</text>
</svg>
