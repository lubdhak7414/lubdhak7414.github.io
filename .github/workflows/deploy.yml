name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow
        run: >
          curl -s
          "https://api.indexnow.org/indexnow?url=https://saf1.me/sitemap-index.xml&key=17862c70-d05e-49ef-812d-27707af4a54a"
          -o /dev/null
          -w "IndexNow: %{http_code}\n"
